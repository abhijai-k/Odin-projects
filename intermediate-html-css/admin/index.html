<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2><img src="icons/dashboard.svg" alt="Dashboard" class="icon" /> Dashboard</h2>
      <nav>
        <ul>
          <li><img src="icons/home.svg" alt="Home" class="icon" /> Home</li>
          <li><img src="icons/profile.svg" alt="Profile" class="icon" /> Profile</li>
          <li><img src="icons/message.svg" alt="Messages" class="icon" /> Messages</li>
          <li><img src="icons/history.svg" alt="History" class="icon" /> History</li>
          <li><img src="icons/task.svg" alt="Tasks" class="icon" /> Tasks</li>
          <li><img src="icons/communities.svg" alt="Communities" class="icon" /> Communities</li>
          <li><img src="icons/settings.svg" alt="Settings" class="icon" /> Settings</li>
          <li><img src="icons/support.svg" alt="Support" class="icon" /> Support</li>
          <li><img src="icons/privacy.svg" alt="Privacy" class="icon" /> Privacy</li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <input type="text" placeholder="Search..." class="search"/>
        <div class="user-info">
          <span><img src="icons/notification.svg" alt="Notification" class="icon" /></span>
          <img src="icons/car.jpg" alt="User Avatar" class="avatar"/>
          <span class="username">Morgan Oakley (@morgan)</span>
        </div>
      </header>

      <div class="action-buttons">
        <button>New</button>
        <button>Upload</button>
        <button>Share</button>
      </div>

      <div class="grid">
        <section class="projects">
          <h3>Your Projects</h3>
          <div class="cards">
    
          </div>
        </section>

    </main>
  </div>
</body>
</html>
